    // Pie chart generator supporting dynamic startangles & slice explosions
    function updatePieDemo() {
      const canvas = document.getElementById('pieDemoCanvas');
      if (!canvas) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const explodeVal = parseInt(document.getElementById('explodeSlider').value) / 100; // Explode factor

        { label: "Bananas", value: 25, explode: false },
        { label: "Cherries", value: 25, explode: false },
        { label: "Dates", value: 15, explode: false }
      ];

      const total = slices.reduce((acc, s) => acc + s.value, 0);
      let currentAngle = (startAngleDeg * Math.PI) / 180; // Standardize to radians

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2 - 10;
      const radius = 65;

      }

      slices.forEach((slice, idx) => {
        const sliceAngle = (slice.value / total) * Math.PI * 2;
        const middleAngle = currentAngle + sliceAngle / 2;

        let ox = 0;
        let oy = 0;

        if (slice.explode && explodeVal > 0) {
          ox = Math.cos(middleAngle) * (explodeVal * 50);
          oy = Math.sin(middleAngle) * (explodeVal * 50);
        }

        ctx.beginPath();
        ctx.moveTo(centerX + ox, centerY + oy);

        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.font = 'bold 9px sans-serif';

      const cx = canvas.width / 2;

      ];

      for (let i = colors.length - 1; i >= 0; i--) {

        ctx.arc(cx, cy, currentRad, 0, Math.PI * 2);
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 0.5;

    // Custom compiler interpreter emulating direct Python-to-canvas rendering
    function compileSandbox() {
      const code = document.getElementById('sandboxTextarea').value;
      const canvas = document.getElementById('sandboxCanvas');
      const status = document.getElementById('sandboxStatus');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      try {
        // Simple regex parser to parse trends inside the sandbox code
        let ypoints = [5, 15, 8, 25, 12]; // Fallback
        const yRegex = /ypoints\s*=\s*np\.array\(\[([\d\s,]+)\]\)/;
        const matchY = code.match(yRegex);
        if (matchY) {
          ypoints = matchY[1].split(',').map(n => parseFloat(n.trim()));
        }

        let xBar = ["A", "B", "C", "D"];
        const xBarRegex = /x\s*=\s*np\.array\(\[([^\]]+)\]\)/;
        const matchXBar = code.match(xBarRegex);
        if (matchXBar) {
          xBar = matchXBar[1].split(',').map(s => s.replace(/['"]/g, '').trim());
        }

        let yBar = [15, 25, 8, 12];
        const yBarRegex = /y\s*=\s*np\.array\(\[([\d\s,]+)\]\)/;
        const matchYBar = code.match(yBarRegex);
        if (matchYBar) {
          yBar = matchYBar[1].split(',').map(n => parseFloat(n.trim()));
        }

        // Title text extract
        let titleText = "Custom Graph Plot";
        const titleRegex = /plt\.title\(([^)]+)\)/;
        const matchTitle = code.match(titleRegex);
        if (matchTitle) {
          titleText = matchTitle[1].split(',')[0].replace(/['"]/g, '').trim();
        }

        // Check which plotting call is fired in the developer sandbox
        if (code.includes('plt.bar')) {
          drawPlotSkeleton(ctx, canvas.width, canvas.height, -0.5, xBar.length - 0.5, 0, Math.max(...yBar) * 1.2, "Categories", "Values", titleText);
          const barWidth = 0.4;
          for (let i = 0; i < yBar.length; i++) {
            const botPt = mapCoordinates(i, 0, canvas.width, canvas.height, -0.5, xBar.length - 0.5, 0, Math.max(...yBar) * 1.2);
            const topPt = mapCoordinates(i, yBar[i], canvas.width, canvas.height, -0.5, xBar.length - 0.5, 0, Math.max(...yBar) * 1.2);
            ctx.fillStyle = '#0f766e';
            ctx.fillRect(topPt.x - 15, topPt.y, 30, botPt.y - topPt.y);
          }
        } else if (code.includes('plt.scatter')) {
          // Parse x and y coords
          let xCoords = [1, 2, 3, 4, 5, 6, 7];
          const xRegex = /x\s*=\s*np\.array\(\[([\d\s,]+)\]\)/;
          const matchX = code.match(xRegex);
          if (matchX) xCoords = matchX[1].split(',').map(n => parseFloat(n.trim()));

          let yCoords = [10, 25, 12, 45, 28, 60, 50];
          const yMatch = code.match(/y\s*=\s*np\.array\(\[([\d\s,]+)\]\)/);
          if (yMatch) yCoords = yMatch[1].split(',').map(n => parseFloat(n.trim()));

          drawPlotSkeleton(ctx, canvas.width, canvas.height, Math.min(...xCoords) - 1, Math.max(...xCoords) + 1, Math.min(...yCoords) - 10, Math.max(...yCoords) + 10, "X-axis", "Y-axis", titleText);
          
          for (let i = 0; i < xCoords.length; i++) {
            const pt = mapCoordinates(xCoords[i], yCoords[i], canvas.width, canvas.height, Math.min(...xCoords) - 1, Math.max(...xCoords) + 1, Math.min(...yCoords) - 10, Math.max(...yCoords) + 10);
            drawCustomMarkerShape(ctx, pt.x, pt.y, 'o', 8, '#ec4899', '#ec4899');
          }
        } else if (code.includes('plt.pie')) {
          // Simulated pie slice parser
          let pieVals = [40, 30, 20, 10];
          const pMatch = code.match(/y\s*=\s*np\.array\(\[([\d\s,]+)\]\)/);
          if (pMatch) pieVals = pMatch[1].split(',').map(n => parseFloat(n.trim()));

          const total = pieVals.reduce((a, b) => a + b, 0);
          let currentAngle = 0;
          const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ec4899'];

          slices = pieVals.map((v, i) => ({ label: `Slice ${i+1}`, value: v }));
          
          slices.forEach((slice, idx) => {
            const sliceAngle = (slice.value / total) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, canvas.height/2);
            ctx.arc(canvas.width/2, canvas.height/2, 60, currentAngle, currentAngle + sliceAngle);
            ctx.closePath();
            ctx.fillStyle = colors[idx % colors.length];
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
            currentAngle += sliceAngle;
          });
        } else {
          // Standard line plot
          drawPlotSkeleton(ctx, canvas.width, canvas.height, 0, ypoints.length - 1, 0, Math.max(...ypoints) * 1.2, "X Indices", "Y Values", titleText);
          ctx.beginPath();
          ctx.strokeStyle = '#0284c7';
          ctx.lineWidth = 3;
          for (let i = 0; i < ypoints.length; i++) {
            const pt = mapCoordinates(i, ypoints[i], canvas.width, canvas.height, 0, ypoints.length - 1, 0, Math.max(...ypoints) * 1.2);
            if (i === 0) ctx.moveTo(pt.x, pt.y);

          }
          ctx.stroke();

        status.innerHTML = `<span class="text-emerald-400 font-bold"><i class="fa-solid fa-circle-check"></i> Code Compiled Successfully</span>`;
      } catch (err) {
        status.innerHTML = `<span class="text-rose-400 font-bold"><i class="fa-solid fa-circle-exclamation"></i> SyntaxError: ${err.message}</span>`;
      }
    }


    // 4. Low Level Canvas Geometry Math Helpers 

    // Frame layout coordinator transformation math
    function mapCoordinates(x, y, w, h, minX, maxX, minY, maxY, padding = 40) {
      const graphW = w - padding * 2;
      const graphH = h - padding * 2;

      const px = padding + ((x - minX) / (maxX - minX)) * graphW;
      const py = h - padding - ((y - minY) / (maxY - minY)) * graphH;

      return { x: px, y: py };
    }

    // Generic frame and scale tick markers generator to mimic Matplotlib layouts
    function drawPlotSkeleton(ctx, w, h, minX, maxX, minY, maxY, xlabel = "", ylabel = "", title = "", gridOpts = null, padding = 40) {
      const graphW = w - padding * 2;
      const graphH = h - padding * 2;

      // Fill basic interior box layout
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(padding, padding, graphW, graphH);
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(padding, padding, graphW, graphH);

      // Handle custom math coordinate grid injection inside simulator
      if (gridOpts && gridOpts.show) {
        ctx.save();
        ctx.strokeStyle = gridOpts.color || '#cccccc';
        ctx.lineWidth = 0.5;
        if (gridOpts.style === 'dashed') ctx.setLineDash([5, 5]);
        else if (gridOpts.style === 'dotted') ctx.setLineDash([1, 3]);

        // Draw Vertical lines
        if (gridOpts.axis === 'both' || gridOpts.axis === 'x') {
          const stepX = (maxX - minX) / 4;
          for (let i = 1; i < 4; i++) {
            const xVal = minX + i * stepX;
            const pt = mapCoordinates(xVal, minY, w, h, minX, maxX, minY, maxY, padding);
            ctx.beginPath();
            ctx.moveTo(pt.x, padding);
            ctx.lineTo(pt.x, h - padding);
            ctx.stroke();
          }
        }
        // Draw Horizontal lines
        if (gridOpts.axis === 'both' || gridOpts.axis === 'y') {
          const stepY = (maxY - minY) / 4;
          for (let i = 1; i < 4; i++) {
            const yVal = minY + i * stepY;
            const pt = mapCoordinates(minX, yVal, w, h, minX, maxX, minY, maxY, padding);
            ctx.beginPath();
            ctx.moveTo(padding, pt.y);
            ctx.lineTo(w - padding, pt.y);
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      // Numeric scale marks along borders
      ctx.fillStyle = '#333333';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';

      // X scale marks
      const stepX = (maxX - minX) / 4;
      for (let i = 0; i <= 4; i++) {
        const xVal = minX + i * stepX;
        const pt = mapCoordinates(xVal, minY, w, h, minX, maxX, minY, maxY, padding);
        ctx.fillText(Number(xVal.toFixed(1)), pt.x, h - padding + 12);
      }

      // Y scale marks
      ctx.textAlign = 'right';
      const stepY = (maxY - minY) / 4;
      for (let i = 0; i <= 4; i++) {
        const yVal = minY + i * stepY;
        const pt = mapCoordinates(minX, yVal, w, h, minX, maxX, minY, maxY, padding);
        ctx.fillText(Number(yVal.toFixed(1)), padding - 5, pt.y + 3);
      }

      // Titles and Label strings
      ctx.fillStyle = '#333333';
      ctx.textAlign = 'center';

      if (title) {
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText(title, w / 2, padding - 10);
      }

      if (xlabel) {
        ctx.font = 'italic 9px sans-serif';
        ctx.fillText(xlabel, w / 2, h - padding + 26);
      }

      if (ylabel) {
        ctx.save();
        ctx.translate(padding - 26, h / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.font = 'italic 9px sans-serif';
        ctx.fillText(ylabel, 0, 0);
        ctx.restore();
      }
    }

    // Geometry generators for standard custom marker shapes
    function drawCustomMarkerShape(ctx, x, y, type, size, edgeColor, fillColor) {
      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = edgeColor;
      ctx.fillStyle = fillColor;
      ctx.lineWidth = 1.5;

      const r = size / 2;

      switch (type) {
        case 'o': // Circle marker
          ctx.arc(x, y, r, 0, Math.PI * 2);
          break;
        case 's': // Square marker
          ctx.rect(x - r, y - r, size, size);
          break;
        case '*': // Star marker
          for (let i = 0; i < 5; i++) {
            ctx.lineTo(Math.cos(((18 + i * 72) * Math.PI) / 180) * r + x, -Math.sin(((18 + i * 72) * Math.PI) / 180) * r + y);
            ctx.lineTo(Math.cos(((54 + i * 72) * Math.PI) / 180) * (r/2) + x, -Math.sin(((54 + i * 72) * Math.PI) / 180) * (r/2) + y);
          }
          ctx.closePath();
          break;
        case 'D': // Diamond marker
          ctx.moveTo(x, y - r);
          ctx.lineTo(x + r, y);
          ctx.lineTo(x, y + r);
          ctx.lineTo(x - r, y);
          ctx.closePath();
          break;
        case '^': // Triangle point up marker
          ctx.moveTo(x, y - r);
          ctx.lineTo(x + r, y + r);
          ctx.lineTo(x - r, y + r);
          ctx.closePath();
          break;
      }
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch((err) => {
          console.error(`Error attempting to enable fullscreen mode: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    // Build sidebar index layout list items
    function buildSidebar() {
      const list = document.getElementById('sidebarList');
      list.innerHTML = "";
      slides.forEach((slide, idx) => {
        const btn = document.createElement('button');
        btn.className = "sidebar-nav-item w-full text-left text-xs px-3 py-2.5 rounded-lg transition font-medium flex items-center space-x-2.5";
        btn.innerHTML = `
          <span class="font-mono text-slate-500 text-[10px]">0${idx+1}</span>
          <span class="truncate">${slide.title}</span>
        `;
        btn.onclick = () => {
          loadSlide(idx);
          toggleSidebar();
        };
        list.appendChild(btn);
      });
    }

    // Monitor standard keyboard arrow layout key presses
    document.addEventListener('keydown', (e) => {
      // Ignore keys when editing code inside inputs or textareas to prevent sliding away
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || document.activeElement.getAttribute('contenteditable') === 'true') {
        return;
      }
      if (e.key === 'ArrowRight' || e.key === ' ') {
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        prevSlide();
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
        e.preventDefault();
      }
    });

    // Double-click to toggle fullscreen
    document.addEventListener('dblclick', (e) => {
      const interactiveTags = ['BUTTON', 'INPUT', 'TEXTAREA', 'A', 'SELECT', 'LABEL', 'I', 'SPAN'];
      if (!interactiveTags.includes(e.target.tagName) && !e.target.closest('button') && !e.target.closest('a') && !e.target.closest('input')) {
        toggleFullscreen();
      }
    });

    window.onload = function() {
      // Deep clone original slide data for fallback restores
      originalSlides = JSON.parse(JSON.stringify(slides));
      
      buildSidebar();
      loadSlide(0);
      lucide.createIcons();
    };
  </script>
</body>
</html>
