            }
        });

        // --- DOM ELEMENTS ---
        const ui = {
            progressBar: document.getElementById('progress-bar'),
            slideCounter: document.getElementById('slide-counter'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            sidebarNav: document.getElementById('sidebar-nav'),
            
            contentView: document.getElementById('content-view'),
            contentContainer: document.getElementById('content-container'),
            
            exerciseView: document.getElementById('exercise-view'),
            exerciseIconContainer: document.getElementById('exercise-icon-container'),
            exerciseTitle: document.getElementById('exercise-title'),
            exerciseInstructions: document.getElementById('exercise-instructions'),
            codeEditor: document.getElementById('code-editor'),
            lineNumbers: document.getElementById('line-numbers'),
            outputConsole: document.getElementById('output-console'),
            
            btnReset: document.getElementById('btn-reset'),
            btnRun: document.getElementById('btn-run'),
            runIcon: document.getElementById('run-icon'),
            runText: document.getElementById('run-text')
        };

        // --- CORE FUNCTIONS ---
        function renderSidebar() {
            ui.sidebarNav.innerHTML = SLIDES.map((slide, index) => {
                const isActive = index === currentSlideIndex;
                const isPast = index < currentSlideIndex;
                
                let iconHtml = '';
                if (isPast) {
                    iconHtml = `<i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i>`;
                } else {
                    const circleClass = isActive ? 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.8)]' : 'bg-slate-700';
                    iconHtml = `<div class="w-2 h-2 rounded-full ${circleClass}"></div>`;
                }

                const baseClasses = "w-full text-left px-4 py-3 flex items-center gap-3 text-sm transition-colors border-l-2";
                const activeClasses = isActive 
                    ? "border-blue-500 bg-blue-500/10 text-white" 
                    : "border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-200";

                return `
                    <button onclick="goToSlide(${index})" class="${baseClasses} ${activeClasses}">
                        ${iconHtml}
                        <span class="truncate">${slide.title}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons({ root: ui.sidebarNav });
        }

        function renderHeader() {
            const progress = ((currentSlideIndex + 1) / SLIDES.length) * 100;
            ui.progressBar.style.width = `${progress}%`;
            ui.slideCounter.textContent = `${currentSlideIndex + 1} / ${SLIDES.length}`;
            
            ui.btnPrev.disabled = currentSlideIndex === 0;
            ui.btnNext.disabled = currentSlideIndex === SLIDES.length - 1;
        }

        function updateLineNumbers() {
            const lines = ui.codeEditor.value.split('\n').length;
            ui.lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => `<div>${i + 1}</div>`).join('');
            
            // Sync scrolling
            ui.lineNumbers.style.transform = `translateY(-${ui.codeEditor.scrollTop}px)`;
        }

        function updateOutputConsole(slideId) {
            const status = outputs[slideId];
            const slide = SLIDES.find(s => s.id === slideId);

            if (!status) {
                ui.outputConsole.innerHTML = `<div class="text-slate-600 italic">Click "Run Code" to execute the script...</div>`;
                ui.btnRun.disabled = false;
                ui.runIcon.setAttribute('data-lucide', 'play');
                ui.runIcon.classList.remove('animate-spin');
                ui.runText.textContent = 'Run Code';
            } else if (status === 'running') {
                ui.outputConsole.innerHTML = `
                    <div class="text-blue-400 flex items-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-4 h-4 animate-spin"></i>
                        Computing...
                    </div>
                `;
                ui.btnRun.disabled = true;
                ui.runIcon.setAttribute('data-lucide', 'rotate-ccw');
                ui.runIcon.classList.add('animate-spin');
                ui.runText.textContent = 'Executing...';
            } else if (status === 'success') {
                ui.outputConsole.innerHTML = slide.mockOutput;
                ui.btnRun.disabled = false;
                ui.runIcon.setAttribute('data-lucide', 'play');
                ui.runIcon.classList.remove('animate-spin');
                ui.runText.textContent = 'Run Code';
            }
            lucide.createIcons({ root: ui.btnRun.parentElement });
            lucide.createIcons({ root: ui.outputConsole });
        }

        function renderMain() {
            const slide = SLIDES[currentSlideIndex];

            if (slide.type === 'content') {
                ui.contentView.classList.remove('hidden-view');
                ui.exerciseView.classList.add('hidden-view');
                ui.contentContainer.innerHTML = slide.content;
                lucide.createIcons({ root: ui.contentContainer });
            } else {
                ui.contentView.classList.add('hidden-view');
                ui.exerciseView.classList.remove('hidden-view');
                
                ui.exerciseIconContainer.innerHTML = `<i data-lucide="${slide.icon}" class="w-6 h-6 ${slide.iconColor}"></i>`;
                ui.exerciseTitle.textContent = slide.title;
                ui.exerciseInstructions.innerHTML = slide.instructions;
                
                ui.codeEditor.value = codes[slide.id] || '';
                updateLineNumbers();
                updateOutputConsole(slide.id);
                
                lucide.createIcons({ root: ui.exerciseIconContainer });
            }
        }

        function renderApp() {
            renderHeader();
            renderSidebar();
            renderMain();
            
            // Ensure any scrolled view is reset to top on slide transitions
            ui.exerciseView.scrollTop = 0;
            ui.contentView.scrollTop = 0;
        }

        // --- EVENT HANDLERS ---
        function goToSlide(index) {
            if (index >= 0 && index < SLIDES.length) {
                currentSlideIndex = index;
                renderApp();
            }
        }

        ui.btnPrev.addEventListener('click', () => goToSlide(currentSlideIndex - 1));
        ui.btnNext.addEventListener('click', () => goToSlide(currentSlideIndex + 1));

        ui.codeEditor.addEventListener('input', (e) => {
            const slide = SLIDES[currentSlideIndex];
            codes[slide.id] = e.target.value;
            updateLineNumbers();
        });

        ui.codeEditor.addEventListener('scroll', () => {
            ui.lineNumbers.style.transform = `translateY(-${ui.codeEditor.scrollTop}px)`;
        });

        ui.codeEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = e.target.selectionStart;
                const end = e.target.selectionEnd;
                const value = e.target.value;
                
                const newCode = value.substring(0, start) + '    ' + value.substring(end);
                
                const slide = SLIDES[currentSlideIndex];
                codes[slide.id] = newCode;
                e.target.value = newCode;
                
                updateLineNumbers();
                e.target.selectionStart = e.target.selectionEnd = start + 4;
            }
        });

        ui.btnRun.addEventListener('click', () => {
            const slideId = SLIDES[currentSlideIndex].id;
            outputs[slideId] = 'running';
            updateOutputConsole(slideId);
            
            setTimeout(() => {
                outputs[slideId] = 'success';
                // Only update if we are still on the same slide
                if (SLIDES[currentSlideIndex].id === slideId) {
                    updateOutputConsole(slideId);
                }
            }, 1200);
        });

        ui.btnReset.addEventListener('click', () => {
            const slide = SLIDES[currentSlideIndex];
            codes[slide.id] = slide.defaultCode;
            outputs[slide.id] = null;
            
            ui.codeEditor.value = codes[slide.id];
            updateLineNumbers();
            updateOutputConsole(slide.id);
        });

        // --- INIT ---
        lucide.createIcons();
        renderApp();
    </script>
</body>
</html>
