        /* Custom scrollbar for slide list drawer */

            width: 6px;
        }

            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 3px;
        }
        /* Page-transition animations */
        .slide-enter {
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(25px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        /* Pulse for glowing animations */
        .glow-pulse {
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
            to { box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); }
        }
        .fade-in {
            animation: fadeInEffect 0.4s ease-out forwards;
        }
        @keyframes fadeInEffect {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

                                `).join('')}
                            </div>
                        </div>

                        <div class="text-center pt-4">
                            <h2 class="text-3xl font-extrabold text-transparent bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text">Thank You!</h2>
                            <p class="text-xs text-slate-400 mt-1">Questions & Collaborative Discussion Board open.</p>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = htmlContent;

            // Update footer indices parameters
            document.getElementById('slide-counter').innerText = `${slide.index} / ${slidesData.length}`;
            document.getElementById('progress-bar').style.width = `${(slide.index / slidesData.length) * 100}%`;

            // Enable or disable page slide navigators based on index constraints
            document.getElementById('prev-btn').disabled = (currentSlideIndex === 0);
            document.getElementById('prev-btn').style.opacity = (currentSlideIndex === 0) ? "0.5" : "1";
            document.getElementById('next-btn').innerHTML = (currentSlideIndex === slidesData.length - 1) ? `Finish <i class="fa-solid fa-check"></i>` : `Next <i class="fa-solid fa-chevron-right"></i>`;
        }


        function toggleCheck(idx) {
            const checked = checklistSelections[idx] = !checklistSelections[idx];
            const card = document.getElementById(`check-card-${idx}`);
            const box = document.getElementById(`check-box-${idx}`);
            
            if (card && box) {
                if (checked) {
                    card.classList.add('border-indigo-500', 'bg-indigo-950/20');
                    box.innerHTML = `<i class="fa-solid fa-check text-white"></i>`;
                    box.classList.add('bg-indigo-600', 'border-indigo-500');
                } else {
                    card.classList.remove('border-indigo-500', 'bg-indigo-950/20');
                    box.innerHTML = '';
                    box.classList.remove('bg-indigo-600', 'border-indigo-500');
                }
            }

            // Calculate percentage score dynamically
            const checkedCount = Object.values(checklistSelections).filter(Boolean).length;
            const totalItems = slidesData[1].checklistItems.length;
            const percentage = Math.round((checkedCount / totalItems) * 100);
            const scoreLabel = document.getElementById('checklist-score');
            if (scoreLabel) {
                scoreLabel.innerText = percentage + "%";
            }
        }

        // Slide 5 Interactive Capability click handler
        function selectGenCapability(idx) {
            activeGenCapabilityIdx = idx;
            const slide = slidesData[currentSlideIndex];
            const activeCapabilityObj = slide.capabilities[idx];

            // Reset selection styling across capability cards
            slide.capabilities.forEach((_, i) => {
                const card = document.getElementById(`gen-cap-card-${i}`);
                if (card) {
                    card.className = "p-3 bg-slate-900/80 border border-slate-800 rounded-xl flex flex-col justify-between items-center text-center cursor-pointer hover:scale-[1.03] hover:border-indigo-500/50 transition duration-300";
                }
            });

            // Highlight selected capability card
            const selectedCard = document.getElementById(`gen-cap-card-${idx}`);
            if (selectedCard) {
                selectedCard.className = "p-3 bg-slate-900/80 border border-indigo-500 bg-indigo-950/20 shadow-lg shadow-indigo-950/40 scale-105 rounded-xl flex flex-col justify-between items-center text-center cursor-pointer hover:scale-[1.03] hover:border-indigo-500/50 transition duration-300";
            }

            // Dynamically update Slide 5 custom mock logo wrapper contents
            const logoWrap = document.getElementById('slide-5-logo-wrap');
            const appTitle = document.getElementById('slide-5-app-title');
            const appDesc = document.getElementById('slide-5-app-desc');
            const appFeature = document.getElementById('slide-5-app-feature');

            if (logoWrap && appTitle && appDesc && appFeature) {
                logoWrap.innerHTML = getAppLogoSVG(activeCapabilityObj.type);
                appTitle.innerText = activeCapabilityObj.appName;
                appDesc.innerText = activeCapabilityObj.appDescription;
                appFeature.innerText = activeCapabilityObj.appFeature;
            }
        }

        function selectSlide7Prompt(idx) {
            if (generationTimer) return; // Prevent selection changes during generation simulation
            activeSlide7PromptIdx = idx;
            renderActiveSlide();
        }

        function triggerImageGenerationDemo() {
            if (generationTimer) return;
            const slide = slidesData[currentSlideIndex];
            const targetPromptObj = slide.promptsList[activeSlide7PromptIdx];

            const btn = document.getElementById('gen-demo-btn');
            const spinner = document.getElementById('spinner-icon');
            const statusText = document.getElementById('slide-7-status');
            const fbIcon = document.getElementById('fallback-icon');
            const fbText = document.getElementById('fallback-text');
            const outputContainer = document.getElementById('demo-output-container');
            const outputImg = document.getElementById('demo-output-img');
            const backdropBg = document.getElementById('slide-7-backdrop');

            // Disable selection buttons during render to protect state
            const buttonWrap = document.getElementById('slide-7-button-container');
            if (buttonWrap) {
                const buttons = buttonWrap.getElementsByTagName('button');
                for (let b of buttons) { b.disabled = true; b.style.opacity = "0.5"; }
            }

            if (btn) btn.disabled = true;
            if (spinner) spinner.classList.add('fa-spin');
            if (fbIcon) fbIcon.style.opacity = '0.3';
            if (statusText) statusText.innerText = "Status: Synthesizing [0%]";
            if (fbText) fbText.innerText = "Running visual diffusion step optimization... [0%]";

            let percentage = 0;
            generationTimer = setInterval(() => {
                percentage += 20;
                if (statusText) statusText.innerText = `Status: Synthesizing [${percentage}%]`;
                if (fbText) fbText.innerText = `Running visual diffusion step optimization... [${percentage}%]`;
                
                if (percentage >= 100) {
                    clearInterval(generationTimer);
                    generationTimer = null;
                    
                    if (btn) btn.disabled = false;
                    if (spinner) spinner.classList.remove('fa-spin');
                    if (statusText) statusText.innerText = "Status: Success";

                    // Restore prompt select buttons
                    if (buttonWrap) {
                        const buttons = buttonWrap.getElementsByTagName('button');
                        for (let b of buttons) { b.disabled = false; b.style.opacity = "1"; }
                    }

                    // Reveal output visual layout
                    if (fbIcon) fbIcon.classList.add('hidden');
                    if (fbText) fbText.classList.add('hidden');
                    
                    if (outputContainer && outputImg && backdropBg) {
                        outputImg.src = targetPromptObj.img;
                        backdropBg.style.backgroundImage = `url('${targetPromptObj.img}')`;
                        outputContainer.classList.remove('hidden');
                        outputContainer.classList.add('fade-in');
                    }
                }
            }, 300);
        }

        // Slide 9 Wheel diagram details selection
        function selectSector(idx) {
            const slide = slidesData[currentSlideIndex];
            const sec = slide.sectors[idx];

            // Reset borders of all cards
            slide.sectors.forEach((_, i) => {
                const card = document.getElementById(`sec-card-${i}`);
                if (card) {
                    card.classList.remove('border-indigo-500', 'bg-indigo-950/20');
                }
            });

            // Highlight selected sector card
            const selectedCard = document.getElementById(`sec-card-${idx}`);
            if (selectedCard) {
                selectedCard.classList.add('border-indigo-500', 'bg-indigo-950/20');
            }

            // Update details preview frame panel
            const panel = document.getElementById('sector-detail-panel');
            const dTitle = document.getElementById('detail-title');
            const dDesc = document.getElementById('detail-desc');
            const dIcon = document.getElementById('detail-icon');

            panel.classList.remove('opacity-60');
            panel.classList.add('border-indigo-500/40', 'bg-slate-900/80');
            dTitle.innerText = `${sec.name} Transformation`;
            dTitle.className = `text-sm font-bold uppercase tracking-wider ${sec.color}`;
            dDesc.innerText = sec.desc;
            dIcon.innerHTML = `<i class="fa-solid ${sec.icon} ${sec.color}"></i>`;
        }

        function selectSlide16Step(idx) {
            activeFlowStepIdx = idx;
            const slide = slidesData[currentSlideIndex];
            const selectedStepObj = slide.steps[idx];

            // Reset node active visual borders and highlights
            slide.steps.forEach((_, i) => {
                const node = document.getElementById(`flow-node-${i}`);
                const icon = document.getElementById(`flow-icon-${i}`);
                if (node) {
                    node.className = "cursor-pointer bg-slate-900/60 border border-slate-800 rounded-xl p-4 relative flex flex-col justify-between items-center text-center transition duration-300";
                }
                if (icon) {
                    icon.classList.remove('text-indigo-400');
                    icon.classList.add('text-slate-300');
                }
            });

            // Highlight selected step node
            const selectedNode = document.getElementById(`flow-node-${idx}`);
            const selectedIcon = document.getElementById(`flow-icon-${idx}`);
            if (selectedNode) {
                selectedNode.className = "cursor-pointer bg-indigo-950/60 border border-indigo-500 shadow-lg shadow-indigo-950/40 scale-105 rounded-xl p-4 relative flex flex-col justify-between items-center text-center transition duration-300 z-20";
            }
            if (selectedIcon) {
                selectedIcon.classList.remove('text-slate-300');
                selectedIcon.classList.add('text-indigo-400');
            }

            // Update uncropped image to correspond with selected step
            const imgPreview = document.getElementById('slide-16-preview');
            const bgPreview = document.getElementById('slide-16-preview-bg');
            if (imgPreview && bgPreview) {
                imgPreview.src = selectedStepObj.img;
                bgPreview.style.backgroundImage = `url('${selectedStepObj.img}')`;
            }
        }

        // Slide 16 Systems Flow simulator trigger
        function triggerFlowSimulation() {
            if (flowTimer) return;
            const btn = document.getElementById('flow-trigger-icon');
            if (btn) btn.className = "fa-solid fa-arrows-spin fa-spin";

            let stepIdx = 0;
            const slide = slidesData[currentSlideIndex];

            // Clear previous step highlight
            slide.steps.forEach((_, i) => {
                const node = document.getElementById(`flow-node-${i}`);
                const icon = document.getElementById(`flow-icon-${i}`);
                if (node) {
                    node.className = "cursor-pointer bg-slate-900/60 border border-slate-800 rounded-xl p-4 relative flex flex-col justify-between items-center text-center transition duration-300";
                }
                if (icon) {
                    icon.classList.remove('text-indigo-400');
                    icon.classList.add('text-slate-300');
                }
            });

            // Sequential step highlight and image swap
            flowTimer = setInterval(() => {
                activeFlowStepIdx = stepIdx;
                const node = document.getElementById(`flow-node-${stepIdx}`);
                const icon = document.getElementById(`flow-icon-${stepIdx}`);
                const imgPreview = document.getElementById('slide-16-preview');
                const bgPreview = document.getElementById('slide-16-preview-bg');

                if (node && icon) {
                    node.className = "cursor-pointer bg-indigo-950/60 border border-indigo-500 rounded-xl p-4 relative flex flex-col justify-between items-center text-center transition duration-300 glow-pulse scale-105 z-20";
                    icon.classList.remove('text-slate-300');
                    icon.classList.add('text-indigo-400');
                }

                // Update uncropped graphics display per flow iteration step
                const currentStepObj = slide.steps[stepIdx];
                if (imgPreview && bgPreview && currentStepObj) {
                    imgPreview.src = currentStepObj.img;
                    bgPreview.style.backgroundImage = `url('${currentStepObj.img}')`;
                }

                stepIdx++;
                if (stepIdx >= 4) {
                    clearInterval(flowTimer);
                    flowTimer = null;
                    if (btn) btn.className = "fa-solid fa-play";
                }
            }, 1200);
        }

        // Slide 20 Steps visual selector
        function selectStep(idx) {
            const card = document.getElementById(`step-card-${idx}`);
            const num = document.getElementById(`step-num-${idx}`);
            if (card && num) {
                if (card.classList.contains('border-indigo-500')) {
                    card.classList.remove('border-indigo-500', 'bg-indigo-950/20');
                    num.classList.replace('bg-indigo-600', 'bg-slate-800');
                } else {
                    card.classList.add('border-indigo-500', 'bg-indigo-950/20');
                    num.classList.replace('bg-slate-800', 'bg-indigo-600');
                }
            }
        }


        function nextSlide() {
            if (currentSlideIndex < slidesData.length - 1) {
                currentSlideIndex++;
                renderActiveSlide();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderActiveSlide();
            }
        }

        // Navigation drawer controls
        function toggleIndexDrawer() {
            const drawer = document.getElementById('index-drawer');
            if (drawer.classList.contains('translate-x-full')) {
                drawer.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('translate-x-full');
            }
        }

        function toggleHelpModal() {
            const modal = document.getElementById('help-modal');
            modal.classList.toggle('hidden');
        }

        function buildSlideIndexList() {
            const container = document.getElementById('slide-list-links');
            container.innerHTML = slidesData.map((s, idx) => `
                <button onclick="jumpToSlide(${idx})" class="w-full text-left px-3.5 py-2 rounded-xl text-xs transition border flex items-center justify-between ${idx === currentSlideIndex ? 'bg-indigo-600 border-indigo-500 text-white font-bold' : 'bg-slate-900 border-slate-800 hover:bg-slate-800 text-slate-300'}">
                    <span>${s.index}. ${s.title}</span>
                    <i class="fa-solid fa-chevron-right text-[9px] opacity-60"></i>
                </button>
            `).join('');
        }

        function jumpToSlide(idx) {
            currentSlideIndex = idx;
            renderActiveSlide();
            toggleIndexDrawer();
            buildSlideIndexList();
        }

        // Fullscreen browser viewport activation toggle
        function toggleFullscreen() {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    icon.className = "fa-solid fa-compress";
                }).catch(err => {
                    console.log("Fullscreen request declined or blocked:", err);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().then(() => {
                        icon.className = "fa-solid fa-expand";
                    });
                }
            }
        }

        // Bind keyboard arrow and space key listeners
        document.addEventListener('keydown', (e) => {
            const activeEl = document.activeElement;
            const capturesArrowKeys = activeEl && (
                (activeEl.tagName === 'INPUT' && activeEl.type !== 'button' && activeEl.type !== 'submit' && activeEl.type !== 'checkbox' && activeEl.type !== 'radio') ||
                activeEl.tagName === 'TEXTAREA' ||
                activeEl.tagName === 'SELECT'
            );
            const capturesSpacebar = activeEl && (
                activeEl.tagName === 'INPUT' ||
                activeEl.tagName === 'TEXTAREA' ||
                activeEl.tagName === 'SELECT' ||
                activeEl.tagName === 'BUTTON' ||
                activeEl.getAttribute('role') === 'button'
            );

            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (!capturesSpacebar && !capturesArrowKeys) {
                    nextSlide();
                    e.preventDefault();
                }
            } else if (e.key === 'ArrowLeft') {
                if (!capturesArrowKeys) {
                    prevSlide();
                    e.preventDefault();
                }
            } else if (e.key === 'f' || e.key === 'F') {
                const capturesTextKeys = activeEl && (
                    activeEl.tagName === 'INPUT' ||
                    activeEl.tagName === 'TEXTAREA'
                );
                if (!capturesTextKeys) {
                    toggleFullscreen();
                    e.preventDefault();
                }
            }
        });

        // Double-click to toggle fullscreen
        document.addEventListener('dblclick', (e) => {
            const interactiveTags = ['BUTTON', 'INPUT', 'TEXTAREA', 'A', 'SELECT', 'LABEL', 'I', 'SPAN'];
            if (!interactiveTags.includes(e.target.tagName) && !e.target.closest('button') && !e.target.closest('a') && !e.target.closest('input')) {
                toggleFullscreen();
            }
        });

        // SWIPE GESTURES FOR MOBILE SCREEN ADAPTIVITY
        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchendX < touchstartX - 60) {
                nextSlide(); // Swipe Left -> Load Next Slide
            }
            if (touchendX > touchstartX + 60) {
                prevSlide(); // Swipe Right -> Load Prev Slide
            }
        }

        window.onload = function () {
            renderActiveSlide();
            buildSlideIndexList();
        };
    </script>
</body>
</html>
